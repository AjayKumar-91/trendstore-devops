apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system

data:
  mapRoles: |
    - rolearn: arn:aws:iam::706257132842:role/eksctl-trend-eks-cluster-nodegroup-NodeInstanceRole-3GLABZ810sDS
      username: system:node:{{EC2PrivateDNSName}}
      groups:
        - system:bootstrappers
        - system:nodes

    - rolearn: arn:aws:iam::706257132842:role/eks-ec2-role   # 👈 Jenkins EC2 Role
      username: jenkins
      groups:
        - system:masters

  mapUsers: |
    - userarn: arn:aws:iam::706257132842:user/eks-admin
      username: eks-admin
      groups:
        - system:masters