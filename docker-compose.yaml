services:
  trendstore:
    image: ajaykumar91/trendstore-app:latest
    container_name: trendstore-container
    ports:
      - "5000:80"
    restart: always
    networks:
      - trend-nw

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana-container
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./data/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./data/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards

    networks:
      - trend-nw
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yaml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yaml:ro
    networks:
      - trend-nw
    restart: unless-stopped  

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-container
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
    - "9100:9100"
    networks:
      - trend-nw   
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - -nginx.scrape-uri=http://trendstore-container:80/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - trendstore
    networks:
      - trend-nw

networks:
  trend-nw:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {} 

