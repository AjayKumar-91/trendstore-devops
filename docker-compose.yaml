services:
  trendstore:
    image: ajaykumar91/trendstore-app:latest
    container_name: trendstore-container
    ports:
      - "5000:80"
    restart: always
    networks:
      - trend-nw

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana-container
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

    networks:
      - trend-nw
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./alert.rules.yaml:/etc/prometheus/alert.rules.yaml:ro
      - ./kubeconfig/config:/etc/prometheus/kubeconfig:ro
      - ./token:/etc/prometheus/token:ro
    networks:
      - trend-nw
    restart: unless-stopped  

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-container
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
    - "9100:9100"
    networks:
      - trend-nw 

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yaml:/etc/alertmanager/alertmanager.yaml
    restart: unless-stopped  
    networks:
      - trend-nw 

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - trend-nw     

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
    - /var/log:/var/log
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - ./promtail.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - trend-nw    

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - -nginx.scrape-uri=http://trendstore-container:80/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - trendstore
    networks:
      - trend-nw

  tempo:
   image: grafana/tempo
   container_name: tempo
   ports:
     - "3200:3200"
   command: ["-config.file=/etc/tempo.yaml"]
   restart: unless-stopped
   networks:
     - trend-nw    

networks:
  trend-nw:
    driver: bridge

volumes:
  prometheus_data: {}
  grafana_data: {} 

