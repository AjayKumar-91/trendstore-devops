apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendstore-deployment
  labels:
    app: trendstore-label
    
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trendstore-label
  template:
    metadata:
      labels:
        app: trendstore-label
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"  
    spec:
      containers:
      - name: trendstore-container
        image: ajaykumar91/trendstore-app:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
