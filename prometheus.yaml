global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yaml"
  
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"  

scrape_configs:

  - job_name: 'trendstore'
    static_configs:
      - targets: ['trendstore:80']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # 👇 ADD THIS HERE (Kubernetes job)
  - job_name: 'kube-state-metrics'
    static_configs:
      - targets:
          - '192.168.35.189:32080'
          - '192.168.26.120:32080'